name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run Ruff
        run: uv run ruff check .

  demo-loop-api:
    name: Demo loop (live API)
    runs-on: ubuntu-latest
    needs:
      - api-tests

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: api
        run: uv sync --extra dev

      - name: Start API and run demo loop
        env:
          APP_STORAGE_BACKEND: memory
          APP_AUTH_ENABLED: "true"
          APP_AUTH_DEMO_SECRET: ci-demo-secret
          APP_OTEL_EXPORTER: none
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          API_PID=$!
          cleanup_api() {
            kill "${API_PID}" 2>/dev/null || true
            wait "${API_PID}" 2>/dev/null || true
          }
          trap cleanup_api EXIT
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8000/v1/ready && break
            sleep 0.25
          done
          curl -sf http://127.0.0.1:8000/v1/ready
          TOKEN="$(uv run python ../scripts/create_demo_jwt.py --tenant-id tenant-a --subject demo-loop-ci)"
          cd ..
          EDD_API_KEY="${TOKEN}" EDD_API_BASE_URL=http://127.0.0.1:8000 ./scripts/run_demo_loop.sh
          cleanup_api
          trap - EXIT
        working-directory: api

  integration-lab-smoke:
    name: Integration lab publish smoke
    runs-on: ubuntu-latest
    needs:
      - api-tests

    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: bfalkowski/edd-agent-lab
          path: edd-agent-lab

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install platform API dependencies
        working-directory: api
        run: uv sync --extra dev

      - name: Verify publish fixtures match lab copies
        run: ./scripts/check_publish_fixtures_sync.sh
        env:
          EDD_LAB_ROOT: ${{ github.workspace }}/edd-agent-lab

      - name: Start API and run lab publish smoke
        env:
          APP_STORAGE_BACKEND: memory
          APP_AUTH_ENABLED: "false"
          APP_OTEL_EXPORTER: none
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          API_PID=$!
          cleanup_api() {
            kill "${API_PID}" 2>/dev/null || true
            wait "${API_PID}" 2>/dev/null || true
          }
          trap cleanup_api EXIT
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8000/v1/ready && break
            sleep 0.25
          done
          curl -sf http://127.0.0.1:8000/v1/ready
          cd ../edd-agent-lab
          EDD_PLATFORM_ROOT="${GITHUB_WORKSPACE}" \
            EDD_API_BASE_URL=http://127.0.0.1:8000 \
            ./scripts/test_platform_publish.sh
          cleanup_api
          trap - EXIT
        working-directory: api

  console-tests:
    name: Console tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run Ruff
        run: uv run ruff check .

  api-static-checks:
    name: API static checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy app

      - name: Export OpenAPI spec
        run: uv run python ../scripts/export_openapi.py

      - name: Check OpenAPI spec is current
        run: git diff --exit-code openapi/openapi.json

  security-checks:
    name: Security checks
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - console-tests
      - api-static-checks

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Audit API dependencies
        working-directory: api
        run: |
          uv sync
          uv pip install pip-audit
          uv run pip-audit --skip-editable --progress-spinner off

      - name: Audit console dependencies
        working-directory: console
        run: |
          uv sync
          uv pip install pip-audit
          uv run pip-audit --skip-editable --progress-spinner off

      - name: Audit worker dependencies
        working-directory: worker
        run: |
          python -m venv .venv-audit
          . .venv-audit/bin/activate
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pip-audit
          pip-audit --skip-editable --progress-spinner off

      - name: Validate Dockerfile policy
        run: python scripts/validate_dockerfile_policy.py

  package-build:
    name: Package build (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - console-tests
      - api-static-checks
      - security-checks
    strategy:
      fail-fast: false
      matrix:
        component: [api, console, worker]

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        if: matrix.component != 'worker'
        with:
          python-version: "3.12"

      - name: Set up Python
        if: matrix.component == 'worker'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        working-directory: ${{ matrix.component }}
        run: |
          if [ "${{ matrix.component }}" = "worker" ]; then
            python -m pip install --upgrade pip build
            python -m build
          else
            uv sync
            uv pip install build
            uv run python -m build
          fi

  container-images:
    name: Container image (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - console-tests
      - api-static-checks
    strategy:
      fail-fast: false
      matrix:
        component: [api, console, worker]
        include:
          - component: api
            image_name: edd-api
            description: FastAPI control plane for the Eval Driven Design Platform
            build_context: api
            dockerfile: api/Dockerfile
          - component: console
            image_name: edd-console
            description: Streamlit operator console for the Eval Driven Design Platform
            build_context: .
            dockerfile: console/Dockerfile
          - component: worker
            image_name: edd-worker
            description: Background worker for Eval Driven Design Platform experiment runs
            build_context: worker
            dockerfile: worker/Dockerfile

    steps:
      - uses: actions/checkout@v5

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image_name }}
          flavor: |
            latest=false
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=${{ matrix.description }}

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.build_context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  helm:
    name: Helm
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - console-tests
      - api-static-checks

    steps:
      - uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: 0.7.0

      - name: Lint chart
        run: helm lint deploy/charts/edd-platform

      - name: Render local values
        run: |
          helm template edd-platform \
            deploy/charts/edd-platform \
            -f deploy/charts/edd-platform/values-local.yaml \
            > rendered-local.yaml

      - name: Render dev values
        run: |
          helm template edd-platform \
            deploy/charts/edd-platform \
            -f deploy/charts/edd-platform/values-dev.yaml \
            > rendered-dev.yaml

      - name: Render prod example values
        run: |
          helm template edd-platform \
            deploy/charts/edd-platform \
            -f deploy/charts/edd-platform/values-prod-example.yaml \
            > rendered-prod-example.yaml

      - name: Validate rendered manifests
        run: kubeconform -strict rendered-local.yaml rendered-dev.yaml rendered-prod-example.yaml
