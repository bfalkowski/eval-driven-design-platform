# Optional Langfuse stack for local dev (Phase 4).
# Usage:
#   cd deploy
#   docker compose -f docker-compose.yml -f docker-compose.langfuse.yml up -d
#
# Langfuse UI: http://localhost:3001
# Demo login: admin@local.dev / local-demo-password
# Demo API keys (seeded on first boot):
#   APP_LANGFUSE_PUBLIC_KEY=pk-lf-local-demo
#   APP_LANGFUSE_SECRET_KEY=sk-lf-local-demo

x-langfuse-env: &langfuse-env
  NEXTAUTH_URL: http://localhost:3001
  DATABASE_URL: postgresql://postgres:postgres@langfuse-postgres:5432/postgres
  SALT: edd-local-langfuse-salt
  ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  TELEMETRY_ENABLED: "false"
  CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
  CLICKHOUSE_URL: http://langfuse-clickhouse:8123
  CLICKHOUSE_USER: clickhouse
  CLICKHOUSE_PASSWORD: clickhouse
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:19090
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
  REDIS_HOST: langfuse-redis
  REDIS_PORT: "6379"
  REDIS_AUTH: myredissecret
  REDIS_TLS_ENABLED: "false"

services:
  langfuse-postgres:
    image: docker.io/postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  langfuse-redis:
    image: docker.io/redis:7
    restart: unless-stopped
    command: >
      --requirepass myredissecret
      --maxmemory-policy noeviction
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "myredissecret", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  langfuse-minio:
    image: cgr.dev/chainguard/minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "127.0.0.1:19090:9000"
      - "127.0.0.1:19091:9001"
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    environment:
      <<: *langfuse-env

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      <<: *langfuse-env
      NEXTAUTH_SECRET: edd-local-nextauth-secret
      LANGFUSE_INIT_ORG_ID: edd-local-org
      LANGFUSE_INIT_ORG_NAME: EDD Local
      LANGFUSE_INIT_PROJECT_ID: local-demo
      LANGFUSE_INIT_PROJECT_NAME: local-demo
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local-demo
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local-demo
      LANGFUSE_INIT_USER_EMAIL: admin@local.dev
      LANGFUSE_INIT_USER_NAME: EDD Admin
      LANGFUSE_INIT_USER_PASSWORD: local-demo-password

  edd-api:
    environment:
      APP_LANGFUSE_ENABLED: "true"
      APP_LANGFUSE_HOST: http://langfuse-web:3000
      APP_LANGFUSE_PUBLIC_KEY: pk-lf-local-demo
      APP_LANGFUSE_SECRET_KEY: sk-lf-local-demo
      APP_LANGFUSE_PROJECT_NAME: local-demo

volumes:
  langfuse-postgres-data:
  langfuse-redis-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
