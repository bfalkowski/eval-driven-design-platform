apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edd-platform.fullname" . }}
  labels:
    {{- include "edd-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "edd-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edd-platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "edd-platform.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: APP_PROCESS_ROLE
              value: {{ ternary "api" .Values.config.processRole .Values.worker.enabled | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "edd-platform.fullname" . }}-config
            - secretRef:
                name: {{ include "edd-platform.secretName" . }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
